# PCAG 서비스 URL 설정
# 개발 환경: 127.0.0.1 + 포트 번호
# Production: Docker 호스트명 또는 외부 URL로 변경
services:
  gateway:
    url: "http://127.0.0.1:8000"
  policy_store:
    url: "http://127.0.0.1:8002"
  sensor_gateway:
    url: "http://127.0.0.1:8003"
  safety_cluster:
    url: "http://127.0.0.1:8001"
  ot_interface:
    url: "http://127.0.0.1:8004"
  evidence_ledger:
    url: "http://127.0.0.1:8005"
  policy_admin:
    url: "http://127.0.0.1:8006"
  plc_adapter:
    url: "http://127.0.0.1:8007"
  dashboard:
    url: "http://127.0.0.1:8008"

dashboard:
  refresh_ms: 2000
  window_minutes: 30
  max_transactions: 18
  max_assets: 8
  log_tail_lines: 120

logging:
  level: INFO        # DEBUG/INFO/WARNING/ERROR
  format: human      # human or json
  console_color: auto
  include_module: true
  include_source_levels:
    - DEBUG
    - WARNING
    - ERROR
    - CRITICAL
  log_file: logs/pcag.log  # optional file output
  log_request_body: false
  log_response_body: false
  mask_fields:             # fields to mask in logs
    - api_key
    - X-API-Key

auth:
  # 런타임 API 키 — 에이전트가 사용
  api_keys:
    - "${PCAG_API_KEY_1:pcag-agent-key-001}"
    - "${PCAG_API_KEY_2:pcag-agent-key-002}"
  # 관리자 API 키 — 정책 관리용
  admin_keys:
    - "${PCAG_ADMIN_KEY:pcag-admin-key-001}"
  # 내부 서비스 간 통신 키 (선택)
  internal_key: "${PCAG_INTERNAL_KEY:pcag-internal-key}"
  # 인증 활성화 여부
  enabled: true
