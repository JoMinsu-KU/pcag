# CBF 상태 매핑 — action_type의 params를 센서 상태 필드에 매핑
# 새로운 action_type 추가 시 여기에 매핑 추가

mappings:
  - action_type: "set_heater_output"
    param: "value"
    maps_to_field: "heater_output"
  - action_type: "set_cooling_valve"
    param: "value"
    maps_to_field: "cooling_valve"
  # Joint positions (direct mapping - param name = sensor field name)
  - action_type: "move_joint"
    param: "joint_0"
    maps_to_field: "joint_0"
  - action_type: "move_joint"
    param: "joint_1"
    maps_to_field: "joint_1"
  - action_type: "move_joint"
    param: "joint_2"
    maps_to_field: "joint_2"
  - action_type: "move_joint"
    param: "joint_3"
    maps_to_field: "joint_3"
  - action_type: "move_joint"
    param: "joint_4"
    maps_to_field: "joint_4"
  - action_type: "move_joint"
    param: "joint_5"
    maps_to_field: "joint_5"
  - action_type: "move_joint"
    param: "joint_6"
    maps_to_field: "joint_6"
  - action_type: "move_joint"
    param: "finger_joint_0"
    maps_to_field: "finger_joint_0"
  - action_type: "move_joint"
    param: "finger_joint_1"
    maps_to_field: "finger_joint_1"
  # Joint velocities
  - action_type: "move_joint"
    param: "joint_0_velocity"
    maps_to_field: "joint_0_velocity"
  - action_type: "move_joint"
    param: "joint_1_velocity"
    maps_to_field: "joint_1_velocity"
  - action_type: "move_joint"
    param: "joint_2_velocity"
    maps_to_field: "joint_2_velocity"
  - action_type: "move_joint"
    param: "joint_3_velocity"
    maps_to_field: "joint_3_velocity"
  - action_type: "move_joint"
    param: "joint_4_velocity"
    maps_to_field: "joint_4_velocity"
  - action_type: "move_joint"
    param: "joint_5_velocity"
    maps_to_field: "joint_5_velocity"
  - action_type: "move_joint"
    param: "joint_6_velocity"
    maps_to_field: "joint_6_velocity"
  - action_type: "move_joint"
    param: "finger_joint_0_velocity"
    maps_to_field: "finger_joint_0_velocity"
  - action_type: "move_joint"
    param: "finger_joint_1_velocity"
    maps_to_field: "finger_joint_1_velocity"
  # Joint efforts/forces
  - action_type: "move_joint"
    param: "joint_0_effort"
    maps_to_field: "joint_0_effort"
  - action_type: "move_joint"
    param: "joint_1_effort"
    maps_to_field: "joint_1_effort"
  - action_type: "move_joint"
    param: "joint_2_effort"
    maps_to_field: "joint_2_effort"
  - action_type: "move_joint"
    param: "joint_3_effort"
    maps_to_field: "joint_3_effort"
  - action_type: "move_joint"
    param: "joint_4_effort"
    maps_to_field: "joint_4_effort"
  - action_type: "move_joint"
    param: "joint_5_effort"
    maps_to_field: "joint_5_effort"
  - action_type: "move_joint"
    param: "joint_6_effort"
    maps_to_field: "joint_6_effort"
  - action_type: "move_joint"
    param: "finger_joint_0_force"
    maps_to_field: "finger_joint_0_force"
  - action_type: "move_joint"
    param: "finger_joint_1_force"
    maps_to_field: "finger_joint_1_force"
  - action_type: "move_to"
    param: "target_x"
    maps_to_field: "position_x"
  - action_type: "move_to"
    param: "target_y"
    maps_to_field: "position_y"
